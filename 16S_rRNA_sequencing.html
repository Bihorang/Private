    function escapeHTML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return '-';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function wrapSequence(seq, width = 80) {
      const chunks = [];
      for (let index = 0; index < seq.length; index += width) chunks.push(seq.slice(index, index + width));
      return chunks.join(String.fromCharCode(10));
    }

    function allReads() {
      return DATA.samples.flatMap(sample => sample.reads.map(read => ({ sample, read })));
    }

    function findSample(code) {
      return DATA.samples.find(sample => sample.code === code) || DATA.samples[0];
    }

    function findRead(sample) {
      return sample.reads.find(read => read.direction === state.read) || sample.reads[0];
    }

    function setHash(view, sampleCode = '') {
      const next = sampleCode ? `${view}:${sampleCode}` : view;
      if (location.hash.slice(1) === next) renderFromHash();
      else location.hash = next;
    }

    function renderFromHash() {
      const hash = decodeURIComponent(location.hash.slice(1));
      const [view, sampleCode] = hash.split(':');
      const allowed = new Set(['home', 'summary', 'guide', 'glossary', 'explanation', 'sources', 'sample']);
      state.view = allowed.has(view) ? view : 'home';
      state.sampleCode = sampleCode || null;
      if (state.view !== 'sample') {
        state.hitFilter = '';
        state.showAllHits = false;
        state.rawOpen = false;
      }
      render();
    }

    function backButton() {
      return `<button class="button" type="button" data-action="home" aria-label="홈으로 돌아가기">← 홈으로</button>`;
    }

    function viewHeader(title, subtitle = '') {
      return `
        <div class="view-head">
          <div class="view-title">
            <h2>${escapeHTML(title)}</h2>
            ${subtitle ? `<p>${escapeHTML(subtitle)}</p>` : ''}
          </div>
          <div class="button-row">${backButton()}</div>
        </div>`;
    }

    function renderSample() {
      const sample = findSample(state.sampleCode);
      if (!sample.reads.some(read => read.direction === state.read)) state.read = sample.reads[0].direction;
      const read = findRead(sample);
      const filteredHits = read.hits.filter(hit => {
        const needle = state.hitFilter.trim().toLowerCase();
        if (!needle) return true;
        return `${hit.accession} ${hit.description} ${hit.identity}`.toLowerCase().includes(needle);
      });
      const visibleHits = state.showAllHits ? filteredHits : filteredHits.slice(0, 10);
      const sequence = `${read.fastaHeader}
${wrapSequence(read.sequence)}`;

      app.innerHTML = `
        <div class="view-head">
          <div class="view-title">
            <h2>${escapeHTML(sample.displayName)} <span class="badge">${escapeHTML(sample.code)}</span></h2>
            <p>${escapeHTML(sample.subtitle)} · <span class="accent">${escapeHTML(sample.group)}</span></p>
          </div>
          <div class="button-row">${backButton()}</div>

                <div class="stat"><dt>Identity</dt><dd>${escapeHTML(read.bestHit?.identity || '-')}</dd></div>
                <div class="stat"><dt>E-value</dt><dd>${escapeHTML(read.bestHit?.evalue || '-')}</dd></div>
                <div class="stat"><dt>Score</dt><dd>${escapeHTML(read.bestHit?.score || '-')}</dd></div>
                <div class="stat"><dt>Strand</dt><dd>${escapeHTML(read.bestHit?.strand || '-')}</dd></div>
              </dl>
            </div>
            <div>
              <h3 style="margin-top:0">서열 정보</h3>
              <dl class="stat-list">
                <div class="stat"><dt>Query length</dt><dd>${read.queryLength.toLocaleString()} bp</dd></div>
                <div class="stat"><dt>SEQ length</dt><dd>${read.seqLength.toLocaleString()} bp</dd></div>
                <div class="stat"><dt>GC content</dt><dd>${read.gc.toFixed(2)}%</dd></div>
                <div class="stat"><dt>N count</dt><dd>${read.baseCounts.N.toLocaleString()}</dd></div>
              </dl>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>FASTA sequence</h3><span class="badge">${read.direction} read</span></div>
          <div class="panel-body"><pre class="sequence-box">${escapeHTML(sequence)}</pre></div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>BLAST hit 목록</h3><span class="badge">${filteredHits.length}개 표시 대상</span></div>
          <div class="panel-body">
            <div class="search-line">
              <label for="hitSearch">검색</label>
              <input id="hitSearch" type="search" value="${escapeHTML(state.hitFilter)}" placeholder="accession, 생물명, identity 검색" data-action="filter">
              <button class="button small" type="button" data-action="toggle-hits">${state.showAllHits ? '상위 10개만 보기' : '전체 hit 보기'}</button>
            </div>
            ${renderHitsTable(visibleHits)}
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>원본 파일</h3></div>
          <div class="panel-body">
            <div class="file-list">
              ${Object.values(read.files).map(file => `
                <div class="file-item">
                  <div class="file-type">${escapeHTML(file.name.split('.').pop())}</div>
                  <div class="file-name"><a href="${escapeHTML(file.url)}" target="_blank" rel="noreferrer">${escapeHTML(file.name)}</a><br><span class="muted">${escapeHTML(file.path)}</span></div>
                  <div class="file-meta">${formatBytes(file.size)}${file.pages ? ` · ${file.pages} pages` : ''}</div>
                </div>

            </div>

        <section class="panel">
          <div class="panel-head">

    function renderHitsTable(hits) {
      if (!hits.length) return '<div class="empty">검색 조건에 맞는 hit가 없습니다.</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Rank</th><th>Accession</th><th>Description</th><th>Subject length</th><th>Score</th><th>E-value</th><th>Identity</th><th>Gaps</th><th>Strand</th></tr>
            </thead>
            <tbody>
              ${hits.map(hit => `
                <tr>
                  <td class="rank-cell">${hit.rank}</td>
                  <td><strong>${escapeHTML(hit.accession)}</strong></td>
                  <td>${escapeHTML(hit.description)}</td>
                  <td>${hit.subjectLength.toLocaleString()}</td>
                  <td>${escapeHTML(hit.score)}</td>
                  <td>${escapeHTML(hit.evalue)}</td>
                  <td><span class="accent">${escapeHTML(hit.identity)}</span></td>
                  <td>${escapeHTML(hit.gaps)}</td>
                  <td>${escapeHTML(hit.strand)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function render() {
      if (state.view === 'summary') return app.innerHTML = renderSummaryPanel(true);
      if (state.view === 'guide') return renderGuide();
      if (state.view === 'glossary') return renderGlossary();
      if (state.view === 'explanation') return renderExplanation();
      if (state.view === 'sources') return renderSources();
      if (state.view === 'sample') return renderSample();
      renderHome();
    }

    app.addEventListener('click', event => {
      const control = event.target.closest('[data-action]');
      if (!control) return;
      const action = control.dataset.action;
      if (action === 'home') setHash('home');
      if (action === 'view') setHash(control.dataset.view);
      if (action === 'sample') {
        state.read = 'F';
        state.hitFilter = '';
        state.showAllHits = false;
        state.rawOpen = false;
        setHash('sample', control.dataset.sample);
      }
      if (action === 'read') {
        state.read = control.dataset.read;
        state.hitFilter = '';
        state.showAllHits = false;
        state.rawOpen = false;
        render();
      }
      if (action === 'toggle-hits') {
        state.showAllHits = !state.showAllHits;
        render();
      }
      if (action === 'toggle-raw') {
        state.rawOpen = !state.rawOpen;
        render();
      }
    });

    app.addEventListener('input', event => {
      if (event.target?.dataset?.action === 'filter') {
        state.hitFilter = event.target.value;
        render();
      }
    });

    window.addEventListener('hashchange', renderFromHash);
    if (!location.hash) location.replace('#home');
    else renderFromHash();
  </script>
</body>
</html>
