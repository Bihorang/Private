<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="좌표를 입력하고 설명, 이미지, 색상, 드래그 가능한 툴팁을 관리하는 단일 HTML 좌표계 편집기">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232176ae'/%3E%3Ccircle cx='20' cy='12' r='5' fill='white'/%3E%3Cpath d='M8 24h16M8 8v16' stroke='white' stroke-width='3' stroke-linecap='round' opacity='.75'/%3E%3C/svg%3E">
  <title>좌표계 편집기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-2: #f0f3f7;
      --line: #d6dce6;
      --line-strong: #9aa7b9;
      --text: #172033;
      --muted: #637086;
      --accent: #2176ae;
      --accent-2: #0f9f8f;
      --danger: #bc3b48;
      --warning: #d28a13;
      --shadow: 0 12px 32px rgba(29, 40, 58, 0.12);
      --radius: 8px;
      --focus: 0 0 0 3px rgba(33, 118, 174, 0.22);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      min-height: 38px;
      padding: 0 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--line-strong);
      background: #f9fbfd;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: none;
      box-shadow: var(--focus);
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: #1a6598;
      border-color: #1a6598;
    }

    button.danger {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }

    button.icon-only {
      width: 38px;
      padding: 0;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(310px, 380px) minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 18px;
      overflow: auto;
      max-height: 100vh;
    }

    main {
      min-width: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(29, 40, 58, 0.05);
    }

    .title-wrap {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 3px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
      background: var(--surface);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 0.98rem;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field label,
    .check-row {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.2;
    }

    .label-with-value {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .label-with-value span {
      color: var(--text);
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 7px;
      min-height: 38px;
      padding: 8px 10px;
    }

    textarea {
      resize: vertical;
      min-height: 76px;
      line-height: 1.45;
    }

    input[type="color"] {
      min-height: 38px;
      padding: 4px;
    }

    input[type="file"] {
      padding: 7px 8px;
      line-height: 1.2;
    }

    input[type="range"] {
      min-height: 32px;
      padding: 0;
      accent-color: var(--accent);
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .button-row button {
      flex: 1 1 auto;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      user-select: none;
    }

    .check-row input {
      width: 16px;
      height: 16px;
      min-height: 16px;
      padding: 0;
    }

    .point-list {
      display: grid;
      gap: 8px;
      max-height: 340px;
      overflow: auto;
      padding-right: 2px;
    }

    .point-item {
      width: 100%;
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      text-align: left;
      padding: 8px 10px;
    }

    .point-item[aria-pressed="true"] {
      border-color: var(--accent);
      background: #edf7fd;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }

    .point-main {
      min-width: 0;
    }

    .point-name {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .point-coord {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--muted);
      background: var(--surface-2);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .canvas-shell {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 14px;
      display: grid;
      place-items: center;
    }

    svg {
      width: min(100%, var(--svg-width, 980px));
      height: auto;
      max-height: calc(100vh - 148px);
      display: block;
      background: #ffffff;
      border-radius: 6px;
      touch-action: none;
    }

    .notice {
      min-height: 24px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    .notice[data-tone="ok"] {
      color: var(--accent-2);
    }

    .notice[data-tone="warn"] {
      color: var(--warning);
    }

    .notice[data-tone="error"] {
      color: var(--danger);
    }

    .image-preview {
      width: 100%;
      min-height: 54px;
      border: 1px dashed var(--line);
      border-radius: 7px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .image-preview img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      background: #fff;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      aside {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        min-height: 70vh;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: stretch;
      }

      .actions button {
        flex: 1 1 130px;
      }

      svg {
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      aside,
      main {
        padding: 12px;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside aria-label="좌표계 설정 패널">
      <section class="panel" aria-labelledby="map-settings-title">
        <h2 id="map-settings-title">좌표계</h2>
        <div class="field">
          <label for="mapTitle">이름</label>
          <input id="mapTitle" type="text" value="새 좌표계" maxlength="80">
        </div>
        <div class="grid-2" style="margin-top:10px">
          <div class="field">
            <label for="minX">X 최소</label>
            <input id="minX" type="number" value="-100" step="1">
          </div>
          <div class="field">
            <label for="maxX">X 최대</label>
            <input id="maxX" type="number" value="100" step="1">
          </div>
          <div class="field">
            <label for="minZ">Z 최소</label>
            <input id="minZ" type="number" value="-100" step="1">
          </div>
          <div class="field">
            <label for="maxZ">Z 최대</label>
            <input id="maxZ" type="number" value="100" step="1">
          </div>
        </div>
        <div class="grid-3" style="margin-top:10px">
          <div class="field">
            <label for="gridStep">눈금 간격</label>
            <input id="gridStep" type="number" value="25" step="1" min="0.0001">
          </div>
          <div class="field">
            <label for="canvasWidth">가로(px)</label>
            <input id="canvasWidth" type="number" value="1100" step="10" min="420">
          </div>
          <div class="field">
            <label for="canvasHeight">세로(px)</label>
            <input id="canvasHeight" type="number" value="760" step="10" min="360">
          </div>
        </div>
        <div class="grid-2" style="margin-top:10px">
          <div class="field">
            <label for="tooltipMode">툴팁 표시</label>
            <select id="tooltipMode">
              <option value="always">항상 표시</option>
              <option value="hover">마우스 올릴 때</option>
              <option value="hidden">숨김</option>
            </select>
          </div>
          <div class="field">
            <label class="label-with-value" for="tooltipScale">
              툴팁 크기
              <span id="tooltipScaleValue">100%</span>
            </label>
            <input id="tooltipScale" type="range" min="60" max="130" step="5" value="100">
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <label for="exportScale">이미지 저장 배율</label>
          <select id="exportScale">
            <option value="1">1x - 기본</option>
            <option value="2">2x - 선명</option>
            <option value="3" selected>3x - 고해상도</option>
            <option value="4">4x - 초고해상도</option>
          </select>
        </div>
        <div class="button-row">
          <button id="applySettings" class="primary" type="button">적용</button>
          <button id="resetTooltips" type="button">툴팁 정렬</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="background-title">
        <h2 id="background-title">배경 이미지</h2>
        <div class="field">
          <label for="backgroundImage">이미지</label>
          <input id="backgroundImage" type="file" accept="image/*">
        </div>
        <div class="image-preview" id="backgroundPreview" style="margin-top:10px">배경 없음</div>
        <div class="grid-2" style="margin-top:10px">
          <div class="field">
            <label for="backgroundOffsetX">가로 위치(px)</label>
            <input id="backgroundOffsetX" type="number" value="0" step="1">
          </div>
          <div class="field">
            <label for="backgroundOffsetY">세로 위치(px)</label>
            <input id="backgroundOffsetY" type="number" value="0" step="1">
          </div>
          <div class="field">
            <label for="backgroundScale">크기(%)</label>
            <input id="backgroundScale" type="number" value="100" step="5" min="5" max="800">
          </div>
          <div class="field">
            <label for="backgroundOpacity">투명도(%)</label>
            <input id="backgroundOpacity" type="number" value="75" step="5" min="0" max="100">
          </div>
        </div>
        <div class="button-row">
          <button id="resetBackground" type="button">배경 초기화</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="point-editor-title">
        <h2 id="point-editor-title">좌표</h2>
        <div class="grid-2">
          <div class="field">
            <label for="pointX">X</label>
            <input id="pointX" type="number" value="0" step="0.01">
          </div>
          <div class="field">
            <label for="pointZ">Z</label>
            <input id="pointZ" type="number" value="0" step="0.01">
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <label for="pointName">이름</label>
          <input id="pointName" type="text" value="" maxlength="80" placeholder="예: 지점 A">
        </div>
        <div class="field" style="margin-top:10px">
          <label for="pointDescription">설명</label>
          <textarea id="pointDescription" maxlength="500" placeholder="좌표에 대한 설명"></textarea>
        </div>
        <div class="grid-2" style="margin-top:10px">
          <div class="field">
            <label for="pointColor">색상</label>
            <input id="pointColor" type="color" value="#e4572e">
          </div>
          <div class="field">
            <label for="pointImage">이미지</label>
            <input id="pointImage" type="file" accept="image/*">
          </div>
        </div>
        <div class="image-preview" id="imagePreview" style="margin-top:10px">이미지 없음</div>
        <div class="button-row">
          <button id="savePoint" class="primary" type="button">좌표 추가</button>
          <button id="clearPointForm" type="button">입력 초기화</button>
          <button id="deletePoint" class="danger" type="button">삭제</button>
        </div>
        <div class="notice" id="formNotice" aria-live="polite"></div>
      </section>

      <section class="panel" aria-labelledby="point-list-title">
        <h2 id="point-list-title">좌표 목록</h2>
        <div id="pointList" class="point-list"></div>
      </section>
    </aside>

    <main>
      <div class="topbar">
        <div class="title-wrap">
          <h1 id="displayTitle">새 좌표계</h1>
          <div class="subtitle" id="displayMeta">X -100 ~ 100 · Z -100 ~ 100 · 0개 좌표</div>
        </div>
        <div class="actions" aria-label="파일 작업">
          <button id="exportMd" type="button">MD 저장</button>
          <button id="importMdButton" type="button">MD 불러오기</button>
          <button id="resetMap" class="danger" type="button">지도 초기화</button>
          <button id="exportPng" class="primary" type="button">이미지 저장</button>
          <input id="importMd" class="hidden-file" type="file" accept=".md,text/markdown,text/plain">
        </div>
      </div>
      <div class="canvas-shell">
        <svg id="coordinateSvg" role="img" aria-label="좌표계"></svg>
      </div>
    </main>
  </div>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const STORAGE_KEY = "coordinate-map-editor:v1";
    const DEFAULT_STATE = {
      version: 1,
      title: "새 좌표계",
      bounds: { minX: -100, maxX: 100, minZ: -100, maxZ: 100 },
      gridStep: 25,
      canvas: { width: 1100, height: 760 },
      showTooltips: true,
      tooltipMode: "always",
      tooltipScale: 1,
      exportScale: 3,
      background: {
        image: "",
        width: 0,
        height: 0,
        offsetX: 0,
        offsetY: 0,
        scale: 1,
        opacity: 0.75
      },
      points: []
    };

    const els = {
      mapTitle: document.querySelector("#mapTitle"),
      minX: document.querySelector("#minX"),
      maxX: document.querySelector("#maxX"),
      minZ: document.querySelector("#minZ"),
      maxZ: document.querySelector("#maxZ"),
      gridStep: document.querySelector("#gridStep"),
      canvasWidth: document.querySelector("#canvasWidth"),
      canvasHeight: document.querySelector("#canvasHeight"),
      tooltipMode: document.querySelector("#tooltipMode"),
      tooltipScale: document.querySelector("#tooltipScale"),
      tooltipScaleValue: document.querySelector("#tooltipScaleValue"),
      exportScale: document.querySelector("#exportScale"),
      backgroundImage: document.querySelector("#backgroundImage"),
      backgroundPreview: document.querySelector("#backgroundPreview"),
      backgroundOffsetX: document.querySelector("#backgroundOffsetX"),
      backgroundOffsetY: document.querySelector("#backgroundOffsetY"),
      backgroundScale: document.querySelector("#backgroundScale"),
      backgroundOpacity: document.querySelector("#backgroundOpacity"),
      resetBackground: document.querySelector("#resetBackground"),
      applySettings: document.querySelector("#applySettings"),
      resetTooltips: document.querySelector("#resetTooltips"),
      pointX: document.querySelector("#pointX"),
      pointZ: document.querySelector("#pointZ"),
      pointName: document.querySelector("#pointName"),
      pointDescription: document.querySelector("#pointDescription"),
      pointColor: document.querySelector("#pointColor"),
      pointImage: document.querySelector("#pointImage"),
      imagePreview: document.querySelector("#imagePreview"),
      savePoint: document.querySelector("#savePoint"),
      clearPointForm: document.querySelector("#clearPointForm"),
      deletePoint: document.querySelector("#deletePoint"),
      formNotice: document.querySelector("#formNotice"),
      pointList: document.querySelector("#pointList"),
      displayTitle: document.querySelector("#displayTitle"),
      displayMeta: document.querySelector("#displayMeta"),
      exportMd: document.querySelector("#exportMd"),
      importMdButton: document.querySelector("#importMdButton"),
      importMd: document.querySelector("#importMd"),
      resetMap: document.querySelector("#resetMap"),
      exportPng: document.querySelector("#exportPng"),
      svg: document.querySelector("#coordinateSvg")
    };

    let state = loadState();
    let selectedPointId = null;
    let pendingImageData = "";
    let activeDrag = null;
    let activeBackgroundDrag = null;
    let hoveredPointId = null;
    let hoverClearTimer = null;
    let liveEditTimer = null;

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_STATE);
        return normalizeState(JSON.parse(raw));
      } catch {
        return clone(DEFAULT_STATE);
      }
    }

    function normalizeState(input) {
      const next = clone(DEFAULT_STATE);
      if (!input || typeof input !== "object") return next;

      next.title = typeof input.title === "string" && input.title.trim() ? input.title.trim() : next.title;
      next.bounds = {
        minX: toFinite(input.bounds?.minX, next.bounds.minX),
        maxX: toFinite(input.bounds?.maxX, next.bounds.maxX),
        minZ: toFinite(input.bounds?.minZ ?? input.bounds?.minY, next.bounds.minZ),
        maxZ: toFinite(input.bounds?.maxZ ?? input.bounds?.maxY, next.bounds.maxZ)
      };
      if (next.bounds.minX === next.bounds.maxX) next.bounds.maxX = next.bounds.minX + 1;
      if (next.bounds.minZ === next.bounds.maxZ) next.bounds.maxZ = next.bounds.minZ + 1;

      next.gridStep = Math.abs(toFinite(input.gridStep, next.gridStep)) || next.gridStep;
      next.canvas = {
        width: clamp(Math.round(toFinite(input.canvas?.width, next.canvas.width)), 420, 4000),
        height: clamp(Math.round(toFinite(input.canvas?.height, next.canvas.height)), 360, 3000)
      };
      next.tooltipMode = normalizeTooltipMode(input.tooltipMode, input.showTooltips);
      next.tooltipScale = clamp(toFinite(input.tooltipScale, next.tooltipScale), 0.6, 1.3);
      next.exportScale = clamp(Math.round(toFinite(input.exportScale, next.exportScale)), 1, 4);
      next.background = normalizeBackground(input.background, next.background);
      next.showTooltips = next.tooltipMode !== "hidden";
      next.points = Array.isArray(input.points) ? input.points.map((point, index) => ({
        id: typeof point.id === "string" ? point.id : makeId(),
        x: toFinite(point.x, 0),
        z: toFinite(point.z ?? point.y, 0),
        name: typeof point.name === "string" && point.name.trim() ? point.name.trim() : `좌표 ${index + 1}`,
        description: typeof point.description === "string" ? point.description : "",
        color: isColor(point.color) ? point.color : paletteColor(index),
        image: typeof point.image === "string" && point.image.startsWith("data:image/") ? point.image : "",
        tooltipDx: toFinite(point.tooltipDx, 20 + (index % 4) * 14),
        tooltipDy: toFinite(point.tooltipDy, -70 - (index % 3) * 18)
      })) : [];
      return next;
    }

    function normalizeBackground(input, fallback) {
      const source = input && typeof input === "object" ? input : {};
      return {
        image: typeof source.image === "string" && source.image.startsWith("data:image/") ? source.image : fallback.image,
        width: clamp(Math.round(toFinite(source.width, fallback.width)), 0, 10000),
        height: clamp(Math.round(toFinite(source.height, fallback.height)), 0, 10000),
        offsetX: toFinite(source.offsetX, fallback.offsetX),
        offsetY: toFinite(source.offsetY, fallback.offsetY),
        scale: clamp(toFinite(source.scale, fallback.scale), 0.05, 8),
        opacity: clamp(toFinite(source.opacity, fallback.opacity), 0, 1)
      };
    }

    function persist() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        return true;
      } catch (error) {
        const isQuotaError = error?.name === "QuotaExceededError" || error?.code === 22;
        setNotice(
          isQuotaError
            ? "자동 저장 용량을 초과했습니다. 큰 이미지를 줄이거나 MD 저장을 먼저 해 주세요."
            : "자동 저장에 실패했습니다.",
          "error"
        );
        return false;
      }
    }

    function toFinite(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function clamp(value, min, max) {
      if (max < min) return min;
      return Math.min(max, Math.max(min, value));
    }

    function normalizeTooltipMode(mode, showTooltips) {
      if (mode === "always" || mode === "hover" || mode === "hidden") return mode;
      return showTooltips === false ? "hidden" : "always";
    }

    function isColor(value) {
      return typeof value === "string" && /^#[0-9a-f]{6}$/i.test(value);
    }

    function paletteColor(index) {
      const colors = ["#e4572e", "#17a398", "#3b6ea8", "#d28a13", "#8a5bd6", "#b23a6f"];
      return colors[index % colors.length];
    }

    function makeId() {
      if (crypto && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      return `point-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function syncSettingsForm() {
      els.mapTitle.value = state.title;
      els.minX.value = state.bounds.minX;
      els.maxX.value = state.bounds.maxX;
      els.minZ.value = state.bounds.minZ;
      els.maxZ.value = state.bounds.maxZ;
      els.gridStep.value = state.gridStep;
      els.canvasWidth.value = state.canvas.width;
      els.canvasHeight.value = state.canvas.height;
      els.tooltipMode.value = state.tooltipMode;
      els.tooltipScale.value = Math.round(state.tooltipScale * 100);
      els.tooltipScaleValue.textContent = `${Math.round(state.tooltipScale * 100)}%`;
      els.exportScale.value = String(state.exportScale);
      syncBackgroundControls();
    }

    function syncBackgroundControls() {
      els.backgroundOffsetX.value = Math.round(state.background.offsetX);
      els.backgroundOffsetY.value = Math.round(state.background.offsetY);
      els.backgroundScale.value = Math.round(state.background.scale * 100);
      els.backgroundOpacity.value = Math.round(state.background.opacity * 100);
      updateBackgroundPreview();
    }

    function clearPointForm() {
      clearTimeout(liveEditTimer);
      selectedPointId = null;
      pendingImageData = "";
      els.pointX.value = 0;
      els.pointZ.value = 0;
      els.pointName.value = "";
      els.pointDescription.value = "";
      els.pointColor.value = paletteColor(state.points.length);
      els.pointImage.value = "";
      els.savePoint.textContent = "좌표 추가";
      els.deletePoint.disabled = true;
      updateImagePreview();
      setNotice("");
      render();
    }

    function scheduleSelectedPointLiveUpdate() {
      if (!selectedPointId) return;
      clearTimeout(liveEditTimer);
      liveEditTimer = setTimeout(updateSelectedPointFromForm, 80);
    }

    function updateSelectedPointFromForm() {
      const point = state.points.find(item => item.id === selectedPointId);
      if (!point) return;

      const x = toFinite(els.pointX.value, NaN);
      const z = toFinite(els.pointZ.value, NaN);
      if (Number.isFinite(x)) point.x = x;
      if (Number.isFinite(z)) point.z = z;
      point.name = els.pointName.value.trim() || "이름 없음";
      point.description = els.pointDescription.value.trim();
      point.color = isColor(els.pointColor.value) ? els.pointColor.value : point.color;
      point.image = pendingImageData;
      persist();
      render();
    }

    function fillPointForm(point) {
      selectedPointId = point.id;
      pendingImageData = point.image || "";
      els.pointX.value = point.x;
      els.pointZ.value = point.z;
      els.pointName.value = point.name;
      els.pointDescription.value = point.description;
      els.pointColor.value = point.color;
      els.pointImage.value = "";
      els.savePoint.textContent = "좌표 수정";
      els.deletePoint.disabled = false;
      updateImagePreview();
      setNotice(`${point.name} 선택됨`, "ok");
      render();
    }

    function setNotice(message, tone = "") {
      els.formNotice.textContent = message;
      els.formNotice.dataset.tone = tone;
    }

    function updateImagePreview() {
      els.imagePreview.replaceChildren();
      if (pendingImageData) {
        const img = document.createElement("img");
        img.alt = "선택한 좌표 이미지 미리보기";
        img.src = pendingImageData;
        els.imagePreview.append(img);
      } else {
        els.imagePreview.textContent = "이미지 없음";
      }
    }

    function updateBackgroundPreview() {
      els.backgroundPreview.replaceChildren();
      if (state.background.image) {
        const img = document.createElement("img");
        img.alt = "배경 이미지 미리보기";
        img.src = state.background.image;
        els.backgroundPreview.append(img);
      } else {
        els.backgroundPreview.textContent = "배경 없음";
      }
    }

    function updateBackgroundFromControls() {
      state.background.offsetX = toFinite(els.backgroundOffsetX.value, state.background.offsetX);
      state.background.offsetY = toFinite(els.backgroundOffsetY.value, state.background.offsetY);
      state.background.scale = clamp(toFinite(els.backgroundScale.value, 100) / 100, 0.05, 8);
      state.background.opacity = clamp(toFinite(els.backgroundOpacity.value, 75) / 100, 0, 1);
    }

    function resetBackground() {
      state.background = clone(DEFAULT_STATE.background);
      els.backgroundImage.value = "";
      syncBackgroundControls();
      persist();
      renderSvg();
      setNotice("배경 이미지를 초기화했습니다.", "ok");
    }

    function applySettingsFromForm() {
      const minX = toFinite(els.minX.value, state.bounds.minX);
      const maxX = toFinite(els.maxX.value, state.bounds.maxX);
      const minZ = toFinite(els.minZ.value, state.bounds.minZ);
      const maxZ = toFinite(els.maxZ.value, state.bounds.maxZ);
      if (minX === maxX || minZ === maxZ) {
        setNotice("최소와 최대 값은 서로 달라야 합니다.", "error");
        return false;
      }

      state.title = els.mapTitle.value.trim() || "새 좌표계";
      state.bounds = {
        minX: Math.min(minX, maxX),
        maxX: Math.max(minX, maxX),
        minZ: Math.min(minZ, maxZ),
        maxZ: Math.max(minZ, maxZ)
      };
      state.gridStep = Math.abs(toFinite(els.gridStep.value, state.gridStep)) || 1;
      state.canvas = {
        width: clamp(Math.round(toFinite(els.canvasWidth.value, state.canvas.width)), 420, 4000),
        height: clamp(Math.round(toFinite(els.canvasHeight.value, state.canvas.height)), 360, 3000)
      };
      state.tooltipMode = normalizeTooltipMode(els.tooltipMode.value, true);
      state.tooltipScale = clamp(toFinite(els.tooltipScale.value, 100) / 100, 0.6, 1.3);
      state.exportScale = clamp(Math.round(toFinite(els.exportScale.value, state.exportScale)), 1, 4);
      updateBackgroundFromControls();
      state.showTooltips = state.tooltipMode !== "hidden";
      syncSettingsForm();
      persist();
      render();
      setNotice("좌표계 설정을 적용했습니다.", "ok");
      return true;
    }

    function savePointFromForm() {
      const x = toFinite(els.pointX.value, NaN);
      const z = toFinite(els.pointZ.value, NaN);
      const name = els.pointName.value.trim();
      if (!Number.isFinite(x) || !Number.isFinite(z)) {
        setNotice("X와 Z 좌표를 숫자로 입력해 주세요.", "error");
        return;
      }
      if (!name) {
        setNotice("좌표 이름을 입력해 주세요.", "error");
        return;
      }

      const payload = {
        x,
        z,
        name,
        description: els.pointDescription.value.trim(),
        color: isColor(els.pointColor.value) ? els.pointColor.value : paletteColor(state.points.length),
        image: pendingImageData
      };

      const existing = state.points.find(point => point.id === selectedPointId);
      if (existing) {
        Object.assign(existing, payload);
        setNotice("좌표를 수정했습니다.", "ok");
      } else {
        const index = state.points.length;
        state.points.push({
          id: makeId(),
          ...payload,
          tooltipDx: 22 + (index % 5) * 18,
          tooltipDy: -78 - (index % 4) * 16
        });
        setNotice("좌표를 추가했습니다.", "ok");
      }

      persist();
      clearPointForm();
    }

    function deleteSelectedPoint() {
      if (!selectedPointId) return;
      const before = state.points.length;
      state.points = state.points.filter(point => point.id !== selectedPointId);
      if (state.points.length !== before) {
        persist();
        clearPointForm();
        setNotice("좌표를 삭제했습니다.", "ok");
      }
    }

    function resetMap() {
      const ok = confirm("현재 지도와 자동 저장 데이터를 모두 초기화할까요?");
      if (!ok) return;

      clearTimeout(hoverClearTimer);
      localStorage.removeItem(STORAGE_KEY);
      state = clone(DEFAULT_STATE);
      selectedPointId = null;
      pendingImageData = "";
      activeDrag = null;
      activeBackgroundDrag = null;
      hoveredPointId = null;
      syncSettingsForm();
      clearPointForm();
      setNotice("지도와 자동 저장 데이터를 초기화했습니다.", "ok");
    }

    function render() {
      renderHeader();
      renderPointList();
      renderSvg();
    }

    function renderHeader() {
      els.displayTitle.textContent = state.title;
      els.displayMeta.textContent = `X ${formatNumber(state.bounds.minX)} ~ ${formatNumber(state.bounds.maxX)} · Z ${formatNumber(state.bounds.minZ)} ~ ${formatNumber(state.bounds.maxZ)} · ${state.points.length}개 좌표`;
    }

    function renderPointList() {
      els.pointList.replaceChildren();
      if (!state.points.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 추가된 좌표가 없습니다.";
        els.pointList.append(empty);
        return;
      }

      state.points.forEach(point => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "point-item";
        item.setAttribute("aria-pressed", String(point.id === selectedPointId));
        item.addEventListener("click", () => fillPointForm(point));

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = point.color;

        const main = document.createElement("span");
        main.className = "point-main";
        const name = document.createElement("span");
        name.className = "point-name";
        name.textContent = point.name;
        const coord = document.createElement("span");
        coord.className = "point-coord";
        coord.textContent = `(${formatNumber(point.x)}, ${formatNumber(point.z)})`;
        main.append(name, coord);

        const imageMark = document.createElement("span");
        imageMark.textContent = point.image ? "IMG" : "";
        imageMark.style.fontSize = "0.7rem";
        imageMark.style.color = "var(--muted)";

        item.append(swatch, main, imageMark);
        els.pointList.append(item);
      });
    }

    function renderSvg() {
      const { width, height, margin, plot } = getPlotMetrics();

      els.svg.style.setProperty("--svg-width", `${width}px`);
      els.svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      els.svg.setAttribute("width", width);
      els.svg.setAttribute("height", height);
      els.svg.replaceChildren();

      appendSvg("rect", els.svg, {
        x: 0,
        y: 0,
        width,
        height,
        fill: "#ffffff"
      });

      const title = appendSvg("text", els.svg, {
        x: margin.left,
        y: 32,
        fill: "#172033",
        "font-size": "20",
        "font-weight": "700"
      });
      title.textContent = state.title;

      appendSvg("text", els.svg, {
        x: width - margin.right,
        y: 32,
        fill: "#637086",
        "font-size": "13",
        "text-anchor": "end"
      }).textContent = `${state.points.length}개 좌표`;

      drawGrid(plot);
      drawAxes(plot);
      drawPoints(plot);
    }

    function getPlotMetrics() {
      const width = state.canvas.width;
      const height = state.canvas.height;
      const margin = { top: 58, right: 58, bottom: 70, left: 82 };
      return {
        width,
        height,
        margin,
        plot: {
          x: margin.left,
          y: margin.top,
          width: Math.max(100, width - margin.left - margin.right),
          height: Math.max(100, height - margin.top - margin.bottom)
        }
      };
    }

    function drawGrid(plot) {
      const { minX, maxX, minZ, maxZ } = state.bounds;
      const xTicks = buildTicks(minX, maxX, state.gridStep, Math.max(4, Math.floor(plot.width / 90)));
      const zTicks = buildTicks(minZ, maxZ, state.gridStep, Math.max(4, Math.floor(plot.height / 58)));

      appendSvg("rect", els.svg, {
        x: plot.x,
        y: plot.y,
        width: plot.width,
        height: plot.height,
        fill: "#fbfcfe",
        stroke: "#9aa7b9",
        "stroke-width": 1,
        "pointer-events": "none"
      });

      drawBackground(plot);

      const gridLayer = appendSvg("g", els.svg, {
        "data-layer": "grid",
        "pointer-events": "none"
      });

      xTicks.forEach(value => {
        const x = mapX(value, plot);
        appendSvg("line", gridLayer, {
          x1: x,
          y1: plot.y,
          x2: x,
          y2: plot.y + plot.height,
          stroke: nearZero(value) ? "#708094" : "#d6dce6",
          "stroke-width": nearZero(value) ? 1.5 : 1
        });
        appendSvg("text", gridLayer, {
          x,
          y: plot.y + plot.height + 22,
          fill: "#637086",
          "font-size": "12",
          "text-anchor": "middle"
        }).textContent = formatNumber(value);
      });

      zTicks.forEach(value => {
        const y = mapZ(value, plot);
        appendSvg("line", gridLayer, {
          x1: plot.x,
          y1: y,
          x2: plot.x + plot.width,
          y2: y,
          stroke: nearZero(value) ? "#708094" : "#d6dce6",
          "stroke-width": nearZero(value) ? 1.5 : 1
        });
        appendSvg("text", gridLayer, {
          x: plot.x - 12,
          y: y + 4,
          fill: "#637086",
          "font-size": "12",
          "text-anchor": "end"
        }).textContent = formatNumber(value);
      });
    }

    function drawBackground(plot) {
      const background = state.background;
      if (!background.image) return;

      const fallbackWidth = plot.width;
      const fallbackHeight = plot.height;
      const imageWidth = (background.width || fallbackWidth) * background.scale;
      const imageHeight = (background.height || fallbackHeight) * background.scale;
      const x = plot.x + background.offsetX;
      const y = plot.y + background.offsetY;
      const clipId = "plot-background-clip";

      const defs = appendSvg("defs", els.svg);
      const clipPath = appendSvg("clipPath", defs, { id: clipId });
      appendSvg("rect", clipPath, {
        x: plot.x,
        y: plot.y,
        width: plot.width,
        height: plot.height
      });

      const group = appendSvg("g", els.svg, {
        "data-layer": "background",
        "clip-path": `url(#${clipId})`
      });
      group.style.cursor = "grab";
      group.addEventListener("pointerdown", startBackgroundDrag);

      appendSvg("image", group, {
        x,
        y,
        width: imageWidth,
        height: imageHeight,
        href: background.image,
        preserveAspectRatio: "xMidYMid meet",
        opacity: background.opacity
      });
    }

    function drawAxes(plot) {
      const { minX, maxX, minZ, maxZ } = state.bounds;
      if (minZ < 0 && maxZ > 0) {
        const y = mapZ(0, plot);
        appendSvg("line", els.svg, {
          x1: plot.x,
          y1: y,
          x2: plot.x + plot.width,
          y2: y,
          stroke: "#172033",
          "stroke-width": 2
        });
      }
      if (minX < 0 && maxX > 0) {
        const x = mapX(0, plot);
        appendSvg("line", els.svg, {
          x1: x,
          y1: plot.y,
          x2: x,
          y2: plot.y + plot.height,
          stroke: "#172033",
          "stroke-width": 2
        });
      }

      appendSvg("text", els.svg, {
        x: plot.x + plot.width,
        y: plot.y + plot.height + 50,
        fill: "#172033",
        "font-size": "13",
        "text-anchor": "end",
        "font-weight": "700"
      }).textContent = "X";
      appendSvg("text", els.svg, {
        x: plot.x - 46,
        y: plot.y + plot.height - 8,
        fill: "#172033",
        "font-size": "13",
        "text-anchor": "start",
        "font-weight": "700"
      }).textContent = "Z";
    }

    function drawPoints(plot) {
      const pointsLayer = appendSvg("g", els.svg, { "data-layer": "points" });
      const tooltipLayer = appendSvg("g", els.svg, { "data-layer": "tooltips" });

      state.points.forEach((point, index) => {
        const x = mapX(point.x, plot);
        const y = mapZ(point.z, plot);
        const inside = point.x >= state.bounds.minX && point.x <= state.bounds.maxX && point.z >= state.bounds.minZ && point.z <= state.bounds.maxZ;
        const safeX = clamp(x, plot.x, plot.x + plot.width);
        const safeY = clamp(y, plot.y, plot.y + plot.height);
        const group = appendSvg("g", pointsLayer, {
          tabindex: "0",
          role: "button",
          "aria-label": `${point.name} (${formatNumber(point.x)}, ${formatNumber(point.z)})`,
          "data-point-id": point.id
        });
        group.style.cursor = "pointer";
        group.addEventListener("pointerenter", () => setHoveredPoint(point.id));
        group.addEventListener("pointerleave", () => clearHoveredPoint(point.id));
        group.addEventListener("focus", () => setHoveredPoint(point.id));
        group.addEventListener("blur", () => clearHoveredPoint(point.id, 0));
        group.addEventListener("click", () => fillPointForm(point));
        group.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            fillPointForm(point);
          }
        });

        appendSvg("line", group, {
          x1: safeX,
          y1: plot.y,
          x2: safeX,
          y2: plot.y + plot.height,
          stroke: point.color,
          "stroke-width": 1,
          "stroke-dasharray": "3 6",
          opacity: inside ? 0.55 : 0.25
        });
        appendSvg("line", group, {
          x1: plot.x,
          y1: safeY,
          x2: plot.x + plot.width,
          y2: safeY,
          stroke: point.color,
          "stroke-width": 1,
          "stroke-dasharray": "3 6",
          opacity: inside ? 0.55 : 0.25
        });
        appendSvg("circle", group, {
          cx: safeX,
          cy: safeY,
          r: point.id === selectedPointId ? 9 : 7,
          fill: point.color,
          stroke: "#ffffff",
          "stroke-width": 3
        });
        appendSvg("circle", group, {
          cx: safeX,
          cy: safeY,
          r: point.id === selectedPointId ? 15 : 13,
          fill: "transparent",
          stroke: point.color,
          "stroke-width": 1.5,
          opacity: point.id === selectedPointId ? 0.8 : 0.28
        });
        appendSvg("text", group, {
          x: safeX + 12,
          y: safeY - 12,
          fill: "#172033",
          "font-size": "12",
          "font-weight": "700"
        }).textContent = point.name;

        if (shouldShowTooltip(point.id)) {
          drawTooltip(tooltipLayer, point, safeX, safeY, index);
        }
      });
    }

    function drawTooltip(layer, point, anchorX, anchorY, index) {
      const scale = state.tooltipScale;
      const width = Math.round(216 * scale);
      const padding = Math.round(10 * scale);
      const imageSize = point.image ? Math.round(54 * scale) : 0;
      const textX = point.image ? padding + imageSize + 10 * scale : padding;
      const titleLines = wrapText(point.name, point.image ? 17 : 27, 2);
      const description = point.description || "설명 없음";
      const descriptionLines = wrapText(description, point.image ? 22 : 32, 4);
      const titleLineHeight = 17 * scale;
      const descLineHeight = 15 * scale;
      const contentHeight = Math.max(
        imageSize,
        18 * scale + titleLines.length * titleLineHeight + 18 * scale + descriptionLines.length * descLineHeight
      );
      const height = contentHeight + padding * 2;
      let x = anchorX + point.tooltipDx;
      let y = anchorY + point.tooltipDy;
      const canvasPadding = 8;
      x = clamp(x, canvasPadding, state.canvas.width - width - canvasPadding);
      y = clamp(y, canvasPadding, state.canvas.height - height - canvasPadding);
      point.tooltipDx = x - anchorX;
      point.tooltipDy = y - anchorY;

      appendSvg("line", layer, {
        x1: anchorX,
        y1: anchorY,
        x2: x,
        y2: y + height / 2,
        stroke: point.color,
        "stroke-width": 1.5,
        opacity: 0.55
      });

      const group = appendSvg("g", layer, {
        transform: `translate(${x} ${y})`,
        "data-tooltip-id": point.id,
        role: "group",
        "aria-label": `${point.name} 툴팁`
      });
      group.style.cursor = "grab";
      group.addEventListener("pointerenter", () => setHoveredPoint(point.id));
      group.addEventListener("pointerleave", () => clearHoveredPoint(point.id));
      group.addEventListener("pointerdown", event => startTooltipDrag(event, point.id));
      group.addEventListener("click", event => {
        event.stopPropagation();
        fillPointForm(point);
      });

      appendSvg("rect", group, {
        x: 0,
        y: 0,
        width,
        height,
        rx: 7 * scale,
        fill: "#ffffff",
        stroke: point.id === selectedPointId ? "#2176ae" : "#9aa7b9",
        "stroke-width": point.id === selectedPointId ? 2 : 1,
        filter: "drop-shadow(0 7px 12px rgba(29, 40, 58, 0.18))"
      });
      appendSvg("rect", group, {
        x: 0,
        y: 0,
        width: 5,
        height,
        rx: 2.5,
        fill: point.color
      });

      if (point.image) {
        appendSvg("image", group, {
          x: padding,
          y: padding + 3 * scale,
          width: imageSize,
          height: imageSize,
          href: point.image,
          preserveAspectRatio: "xMidYMid meet"
        });
        appendSvg("rect", group, {
          x: padding,
          y: padding + 3 * scale,
          width: imageSize,
          height: imageSize,
          fill: "none",
          stroke: "#d6dce6",
          "stroke-width": 1
        });
      }

      const title = appendSvg("text", group, {
        x: textX,
        y: padding + 14 * scale,
        fill: "#172033",
        "font-size": 13 * scale,
        "font-weight": "700"
      });
      titleLines.forEach((line, lineIndex) => {
        const tspan = appendSvg("tspan", title, {
          x: textX,
          dy: lineIndex === 0 ? 0 : titleLineHeight
        });
        tspan.textContent = line;
      });

      appendSvg("text", group, {
        x: textX,
        y: padding + 18 * scale + titleLines.length * titleLineHeight,
        fill: "#637086",
        "font-size": 11 * scale
      }).textContent = `(${formatNumber(point.x)}, ${formatNumber(point.z)})`;

      const desc = appendSvg("text", group, {
        x: textX,
        y: padding + 40 * scale + titleLines.length * titleLineHeight,
        fill: "#344050",
        "font-size": 12 * scale
      });
      descriptionLines.forEach((line, lineIndex) => {
        const tspan = appendSvg("tspan", desc, {
          x: textX,
          dy: lineIndex === 0 ? 0 : descLineHeight
        });
        tspan.textContent = line;
      });
    }

    function shouldShowTooltip(pointId) {
      if (state.tooltipMode === "hidden") return false;
      if (state.tooltipMode === "always") return true;
      return hoveredPointId === pointId || activeDrag?.pointId === pointId;
    }

    function setHoveredPoint(pointId) {
      clearTimeout(hoverClearTimer);
      if (hoveredPointId === pointId) return;
      hoveredPointId = pointId;
      if (state.tooltipMode === "hover") renderSvg();
    }

    function clearHoveredPoint(pointId, delay = 160) {
      clearTimeout(hoverClearTimer);
      hoverClearTimer = setTimeout(() => {
        if (activeDrag?.pointId === pointId) return;
        if (hoveredPointId !== pointId) return;
        hoveredPointId = null;
        if (state.tooltipMode === "hover") renderSvg();
      }, delay);
    }

    function appendSvg(tag, parent, attrs = {}) {
      const element = document.createElementNS(SVG_NS, tag);
      Object.entries(attrs).forEach(([name, value]) => {
        element.setAttribute(name, value);
      });
      parent.append(element);
      return element;
    }

    function buildTicks(min, max, requestedStep, maxTickCount = 12) {
      const span = Math.abs(max - min);
      const targetCount = clamp(maxTickCount, 4, 18);
      const readableStep = niceStep(span / targetCount);
      const requested = Math.abs(toFinite(requestedStep, 0));
      const step = requested > 0 ? Math.max(requested, readableStep) : readableStep;
      const ticks = [];
      const start = Math.ceil(min / step) * step;
      const limit = targetCount + 4;
      for (let value = start, i = 0; value <= max + step * 0.001 && i < limit; value += step, i += 1) {
        ticks.push(roundTick(value));
      }
      if (!ticks.length) {
        ticks.push(min, max);
      }
      return ticks;
    }

    function niceStep(value) {
      const exponent = Math.floor(Math.log10(value || 1));
      const fraction = value / Math.pow(10, exponent);
      const niceFraction = fraction <= 1 ? 1 : fraction <= 2 ? 2 : fraction <= 5 ? 5 : 10;
      return niceFraction * Math.pow(10, exponent);
    }

    function roundTick(value) {
      return Number(Math.abs(value) < 1e-9 ? 0 : value.toPrecision(12));
    }

    function nearZero(value) {
      return Math.abs(value) < 1e-9;
    }

    function mapX(value, plot) {
      const { minX, maxX } = state.bounds;
      return plot.x + ((value - minX) / (maxX - minX)) * plot.width;
    }

    function mapZ(value, plot) {
      const { minZ, maxZ } = state.bounds;
      return plot.y + ((value - minZ) / (maxZ - minZ)) * plot.height;
    }

    function formatNumber(value) {
      return Number(value).toLocaleString("ko-KR", {
        maximumFractionDigits: 4
      });
    }

    function wrapText(text, maxChars, maxLines) {
      const source = String(text || "").replace(/\s+/g, " ").trim();
      if (!source) return [""];
      const words = source.split(" ");
      const lines = [];
      let current = "";

      words.forEach(word => {
        if (word.length > maxChars) {
          if (current) {
            lines.push(current);
            current = "";
          }
          for (let i = 0; i < word.length; i += maxChars) {
            lines.push(word.slice(i, i + maxChars));
          }
          return;
        }
        const candidate = current ? `${current} ${word}` : word;
        if (candidate.length > maxChars) {
          lines.push(current);
          current = word;
        } else {
          current = candidate;
        }
      });
      if (current) lines.push(current);

      if (lines.length > maxLines) {
        const trimmed = lines.slice(0, maxLines);
        trimmed[maxLines - 1] = `${trimmed[maxLines - 1].slice(0, Math.max(1, maxChars - 1))}…`;
        return trimmed;
      }
      return lines;
    }

    function startTooltipDrag(event, pointId) {
      event.preventDefault();
      event.stopPropagation();
      const point = state.points.find(item => item.id === pointId);
      if (!point) return;
      const pointer = svgPoint(event);
      clearTimeout(hoverClearTimer);
      hoveredPointId = pointId;
      activeDrag = {
        pointId,
        startX: pointer.x,
        startY: pointer.y,
        dx: point.tooltipDx,
        dy: point.tooltipDy
      };
      event.currentTarget.style.cursor = "grabbing";
      event.currentTarget.setPointerCapture(event.pointerId);
    }

    function startBackgroundDrag(event) {
      if (!state.background.image) return;
      event.preventDefault();
      event.stopPropagation();
      const pointer = svgPoint(event);
      activeBackgroundDrag = {
        startX: pointer.x,
        startY: pointer.y,
        offsetX: state.background.offsetX,
        offsetY: state.background.offsetY
      };
      event.currentTarget.style.cursor = "grabbing";
      event.currentTarget.setPointerCapture(event.pointerId);
    }

    function moveTooltipDrag(event) {
      if (!activeDrag) return;
      const point = state.points.find(item => item.id === activeDrag.pointId);
      if (!point) return;
      const pointer = svgPoint(event);
      point.tooltipDx = activeDrag.dx + pointer.x - activeDrag.startX;
      point.tooltipDy = activeDrag.dy + pointer.y - activeDrag.startY;
      renderSvg();
    }

    function moveBackgroundDrag(event) {
      if (!activeBackgroundDrag) return;
      const pointer = svgPoint(event);
      state.background.offsetX = activeBackgroundDrag.offsetX + pointer.x - activeBackgroundDrag.startX;
      state.background.offsetY = activeBackgroundDrag.offsetY + pointer.y - activeBackgroundDrag.startY;
      syncBackgroundControls();
      renderSvg();
    }

    function endTooltipDrag() {
      if (!activeDrag) return;
      const pointId = activeDrag.pointId;
      activeDrag = null;
      persist();
      clearHoveredPoint(pointId, 400);
    }

    function endBackgroundDrag() {
      if (!activeBackgroundDrag) return;
      activeBackgroundDrag = null;
      persist();
    }

    function svgPoint(event) {
      const svgPoint = els.svg.createSVGPoint();
      svgPoint.x = event.clientX;
      svgPoint.y = event.clientY;
      const matrix = els.svg.getScreenCTM();
      if (!matrix) return { x: 0, y: 0 };
      const transformed = svgPoint.matrixTransform(matrix.inverse());
      return { x: transformed.x, y: transformed.y };
    }

    function resetTooltipOffsets() {
      state.points.forEach((point, index) => {
        point.tooltipDx = 22 + (index % 5) * 18;
        point.tooltipDy = -78 - (index % 4) * 16;
      });
      persist();
      render();
      setNotice("툴팁 위치를 다시 정렬했습니다.", "ok");
    }

    function exportMarkdown() {
      const data = {
        format: "coordinate-map-v1",
        exportedAt: new Date().toISOString(),
        title: state.title,
        bounds: state.bounds,
        gridStep: state.gridStep,
        canvas: state.canvas,
        showTooltips: state.tooltipMode !== "hidden",
        tooltipMode: state.tooltipMode,
        tooltipScale: state.tooltipScale,
        exportScale: state.exportScale,
        background: state.background,
        points: state.points
      };
      const rows = state.points.map(point => {
        const description = point.description.replace(/\|/g, "\\|").replace(/\n/g, " ");
        return `| ${point.name.replace(/\|/g, "\\|")} | ${point.x} | ${point.z} | ${point.color} | ${description} | ${point.image ? "있음" : "없음"} |`;
      }).join("\n");
      const markdown = [
        `# ${state.title}`,
        "",
        "## 좌표계",
        "",
        `- X 범위: ${state.bounds.minX} ~ ${state.bounds.maxX}`,
        `- Z 범위: ${state.bounds.minZ} ~ ${state.bounds.maxZ}`,
        `- 눈금 간격: ${state.gridStep}`,
        `- 캔버스 크기: ${state.canvas.width} x ${state.canvas.height}px`,
        `- 툴팁 표시: ${tooltipModeLabel(state.tooltipMode)}`,
        `- 툴팁 크기: ${Math.round(state.tooltipScale * 100)}%`,
        `- 이미지 저장 배율: ${state.exportScale}x`,
        `- 배경 이미지: ${state.background.image ? "있음" : "없음"}`,
        `- 배경 위치: x ${Math.round(state.background.offsetX)}px, y ${Math.round(state.background.offsetY)}px`,
        `- 배경 크기: ${Math.round(state.background.scale * 100)}%`,
        `- 배경 투명도: ${Math.round(state.background.opacity * 100)}%`,
        "",
        "## 좌표 목록",
        "",
        "| 이름 | X | Z | 색상 | 설명 | 이미지 |",
        "| --- | ---: | ---: | --- | --- | --- |",
        rows || "| 없음 |  |  |  |  |  |",
        "",
        "## 다시 불러오기용 데이터",
        "",
        "```coordinate-map",
        JSON.stringify(data, null, 2),
        "```",
        ""
      ].join("\n");
      downloadBlob(markdown, `${safeFileName(state.title)}.md`, "text/markdown;charset=utf-8");
      setNotice("MD 파일을 저장했습니다.", "ok");
    }

    function importMarkdownFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = parseMarkdownData(String(reader.result || ""));
          state = normalizeState(imported);
          selectedPointId = null;
          pendingImageData = "";
          syncSettingsForm();
          clearPointForm();
          persist();
          render();
          setNotice("MD 파일을 불러왔습니다.", "ok");
        } catch (error) {
          setNotice(error.message || "MD 파일을 읽을 수 없습니다.", "error");
        }
      };
      reader.onerror = () => setNotice("파일을 읽는 중 오류가 발생했습니다.", "error");
      reader.readAsText(file);
    }

    function parseMarkdownData(text) {
      const coordinateFence = text.match(/```coordinate-map\s*([\s\S]*?)```/);
      const jsonFence = text.match(/```json\s*([\s\S]*?)```/);
      const body = coordinateFence?.[1] || jsonFence?.[1];
      if (!body) {
        throw new Error("불러오기용 coordinate-map 데이터 블록을 찾지 못했습니다.");
      }
      const parsed = JSON.parse(body);
      if (parsed.format && parsed.format !== "coordinate-map-v1") {
        throw new Error("지원하지 않는 좌표계 MD 형식입니다.");
      }
      return parsed;
    }

    function tooltipModeLabel(mode) {
      return {
        always: "항상 표시",
        hover: "마우스 올릴 때",
        hidden: "숨김"
      }[mode] || "항상 표시";
    }

    async function exportPng() {
      const exportScale = clamp(Math.round(toFinite(state.exportScale, 3)), 1, 4);
      const exportWidth = state.canvas.width * exportScale;
      const exportHeight = state.canvas.height * exportScale;
      const svgClone = els.svg.cloneNode(true);
      svgClone.setAttribute("xmlns", SVG_NS);
      svgClone.setAttribute("width", exportWidth);
      svgClone.setAttribute("height", exportHeight);
      svgClone.setAttribute("viewBox", `0 0 ${state.canvas.width} ${state.canvas.height}`);
      const serialized = new XMLSerializer().serializeToString(svgClone);
      const svgBlob = new Blob([serialized], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const image = new Image();
      image.decoding = "async";
      image.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = exportWidth;
        canvas.height = exportHeight;
        const context = canvas.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, exportWidth, exportHeight);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => {
          if (!blob) {
            setNotice("이미지 생성에 실패했습니다.", "error");
            return;
          }
          downloadBlob(blob, `${safeFileName(state.title)}_${exportScale}x.png`, "image/png");
          setNotice(`이미지 파일을 ${exportWidth} x ${exportHeight}px로 저장했습니다.`, "ok");
        }, "image/png");
      };
      image.onerror = () => {
        URL.revokeObjectURL(url);
        setNotice("이미지로 변환하는 중 오류가 발생했습니다.", "error");
      };
      image.src = url;
    }

    function downloadBlob(content, filename, type) {
      const blob = content instanceof Blob ? content : new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.append(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(url), 800);
    }

    function safeFileName(value) {
      return String(value || "coordinate-map")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "coordinate-map";
    }

    els.applySettings.addEventListener("click", applySettingsFromForm);
    els.tooltipMode.addEventListener("change", () => {
      state.tooltipMode = normalizeTooltipMode(els.tooltipMode.value, true);
      state.showTooltips = state.tooltipMode !== "hidden";
      hoveredPointId = null;
      persist();
      renderSvg();
    });
    els.tooltipScale.addEventListener("input", () => {
      state.tooltipScale = clamp(toFinite(els.tooltipScale.value, 100) / 100, 0.6, 1.3);
      els.tooltipScaleValue.textContent = `${Math.round(state.tooltipScale * 100)}%`;
      persist();
      renderSvg();
    });
    els.exportScale.addEventListener("change", () => {
      state.exportScale = clamp(Math.round(toFinite(els.exportScale.value, state.exportScale)), 1, 4);
      persist();
    });
    [els.backgroundOffsetX, els.backgroundOffsetY, els.backgroundScale, els.backgroundOpacity].forEach(input => {
      input.addEventListener("input", () => {
        updateBackgroundFromControls();
        persist();
        renderSvg();
      });
    });
    els.backgroundImage.addEventListener("change", () => {
      const file = els.backgroundImage.files?.[0];
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        setNotice("배경은 이미지 파일만 선택할 수 있습니다.", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          const { plot } = getPlotMetrics();
          const naturalWidth = image.naturalWidth || image.width || plot.width;
          const naturalHeight = image.naturalHeight || image.height || plot.height;
          const fitScale = Math.min(plot.width / naturalWidth, plot.height / naturalHeight, 1);
          state.background = {
            image: String(reader.result || ""),
            width: naturalWidth,
            height: naturalHeight,
            scale: clamp(fitScale, 0.05, 8),
            opacity: state.background.opacity,
            offsetX: Math.round((plot.width - naturalWidth * fitScale) / 2),
            offsetY: Math.round((plot.height - naturalHeight * fitScale) / 2)
          };
          syncBackgroundControls();
          persist();
          renderSvg();
          setNotice("배경 이미지를 적용했습니다. 지도에서 드래그해 위치를 조정할 수 있습니다.", "ok");
        };
        image.onerror = () => setNotice("배경 이미지를 읽을 수 없습니다.", "error");
        image.src = String(reader.result || "");
      };
      reader.onerror = () => setNotice("배경 이미지를 읽을 수 없습니다.", "error");
      reader.readAsDataURL(file);
    });
    els.resetBackground.addEventListener("click", resetBackground);
    els.resetTooltips.addEventListener("click", resetTooltipOffsets);
    [els.pointX, els.pointZ, els.pointName, els.pointDescription, els.pointColor].forEach(input => {
      input.addEventListener("input", scheduleSelectedPointLiveUpdate);
    });
    els.savePoint.addEventListener("click", savePointFromForm);
    els.clearPointForm.addEventListener("click", clearPointForm);
    els.deletePoint.addEventListener("click", deleteSelectedPoint);
    els.exportMd.addEventListener("click", exportMarkdown);
    els.importMdButton.addEventListener("click", () => els.importMd.click());
    els.importMd.addEventListener("change", () => {
      importMarkdownFile(els.importMd.files?.[0]);
      els.importMd.value = "";
    });
    els.resetMap.addEventListener("click", resetMap);
    els.exportPng.addEventListener("click", exportPng);
    els.pointImage.addEventListener("change", () => {
      const file = els.pointImage.files?.[0];
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        setNotice("이미지 파일만 선택할 수 있습니다.", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        pendingImageData = String(reader.result || "");
        updateImagePreview();
        scheduleSelectedPointLiveUpdate();
      };
      reader.onerror = () => setNotice("이미지를 읽을 수 없습니다.", "error");
      reader.readAsDataURL(file);
    });
    window.addEventListener("pointermove", event => {
      moveTooltipDrag(event);
      moveBackgroundDrag(event);
    });
    window.addEventListener("pointerup", () => {
      endTooltipDrag();
      endBackgroundDrag();
    });
    window.addEventListener("pointercancel", () => {
      endTooltipDrag();
      endBackgroundDrag();
    });

    syncSettingsForm();
    clearPointForm();
    render();
  </script>
</body>
</html>
